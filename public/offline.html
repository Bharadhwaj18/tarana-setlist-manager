<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarana — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fefae0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #e9c46a;
      border-bottom: 1px solid #d4a373;
      padding: 0.75rem 1rem;
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: #1a1a1a;
    }
    .topbar-logo img {
      width: 2rem;
      height: 2rem;
      border-radius: 0.5rem;
      background: #111;
      padding: 2px;
      object-fit: contain;
    }
    .offline-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 9999px;
      padding: 0.2rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: #856404;
    }

    /* Nav tabs */
    .nav {
      position: fixed;
      top: 3.25rem;
      left: 0;
      right: 0;
      z-index: 39;
      display: flex;
      background: #fefae0;
      border-bottom: 1px solid #d4a373;
    }
    .nav a {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
      border-bottom: 2px solid transparent;
    }
    .nav a.active {
      color: #d4a373;
      border-bottom-color: #d4a373;
    }

    /* Main content */
    .main {
      padding: 7rem 1rem 2rem;
      max-width: 640px;
      margin: 0 auto;
    }

    /* Section */
    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
    }
    .section-sub {
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 1.25rem;
    }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #d4a373;
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
      margin-bottom: 0.75rem;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card:hover { background: #fefae0; }
    .card-title {
      font-weight: 600;
      font-size: 0.9375rem;
      color: #1a1a1a;
    }
    .card-meta {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 0.2rem;
    }
    .card-key {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      border-radius: 4px;
      padding: 0 0.4rem;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 0.5rem;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #9ca3af;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty h3 { font-size: 1rem; font-weight: 600; color: #6b7280; margin-bottom: 0.5rem; }
    .empty p { font-size: 0.85rem; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <img src="/logo.png" alt="Tarana" onerror="this.style.display='none'" />
    Tarana
  </div>
  <div class="offline-badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
    Offline mode
  </div>
</div>

<nav class="nav">
  <a href="/setlists" id="nav-setlists">Setlists</a>
  <a href="/songs" id="nav-songs">Songs</a>
</nav>

<main class="main">

  <!-- Setlists view -->
  <div id="view-setlists">
    <div class="section-title">Offline Setlists</div>
    <div class="section-sub" id="user-greeting">Your saved setlists</div>
    <div id="setlists-list"></div>
  </div>

  <!-- Songs view -->
  <div id="view-songs" class="hidden">
    <div class="section-title">Offline Songs</div>
    <div class="section-sub">Songs from saved setlists</div>
    <div id="songs-list"></div>
  </div>

</main>

<script>
  // Read localStorage data
  function getData(key) {
    try { return JSON.parse(localStorage.getItem(key) || '[]') } catch { return [] }
  }
  function getObj(key) {
    try { return JSON.parse(localStorage.getItem(key) || 'null') } catch { return null }
  }

  const user = getObj('tarana-user')
  const setlists = getData('tarana-offline-setlists')
  const songs = getData('tarana-offline-songs')

  // User greeting
  if (user) {
    const name = user.displayName || user.email || ''
    if (name) document.getElementById('user-greeting').textContent = 'Saved setlists for ' + name
  }

  // Determine current view from pathname
  const path = window.location.pathname
  const isSongs = path.startsWith('/songs')

  // Set active nav
  document.getElementById(isSongs ? 'nav-songs' : 'nav-setlists').classList.add('active')

  // Show correct view
  if (isSongs) {
    document.getElementById('view-setlists').classList.add('hidden')
    document.getElementById('view-songs').classList.remove('hidden')
  }

  // Render setlists
  const setlistsEl = document.getElementById('setlists-list')
  if (setlists.length === 0) {
    setlistsEl.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><h3>No setlists saved yet</h3><p>Go online and tap "Save offline" on any setlist.</p></div>'
  } else {
    setlists.sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt))
    setlists.forEach(s => {
      const saved = new Date(s.savedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })
      const a = document.createElement('a')
      a.href = '/setlists/' + s.id
      a.className = 'card'
      a.innerHTML = '<div class="card-title">' + escHtml(s.title) + '</div><div class="card-meta">Saved ' + saved + (s.songCount ? ' · ' + s.songCount + ' songs' : '') + '</div>'
      setlistsEl.appendChild(a)
    })
  }

  // Render songs
  const songsEl = document.getElementById('songs-list')
  if (songs.length === 0) {
    songsEl.innerHTML = '<div class="empty"><div class="empty-icon">🎵</div><h3>No songs saved yet</h3><p>Save a setlist offline to see its songs here.</p></div>'
  } else {
    const seen = new Set()
    const unique = songs.filter(s => { if (seen.has(s.id)) return false; seen.add(s.id); return true })
    unique.sort((a, b) => a.title.localeCompare(b.title))
    unique.forEach(s => {
      const div = document.createElement('div')
      div.className = 'card'
      div.style.cursor = 'default'
      div.innerHTML =
        '<div class="card-title">' + escHtml(s.title) + (s.song_key ? '<span class="card-key">' + escHtml(s.song_key) + '</span>' : '') + '</div>' +
        '<div class="card-meta">' + (s.artist ? escHtml(s.artist) + ' · ' : '') + 'From ' + escHtml(s.setlistTitle || 'setlist') + '</div>'
      songsEl.appendChild(div)
    })
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
</script>
</body>
</html>
